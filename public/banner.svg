<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="glow" x1="640" y1="0" x2="640" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Glow blob -->
  <ellipse cx="640" cy="200" rx="400" ry="200" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Score arc decorative -->
  <circle cx="980" cy="300" r="160" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 8" opacity="0.2"/>
  <circle cx="980" cy="300" r="120" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 8" opacity="0.15"/>

  <!-- Score number -->
  <text x="980" y="285" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="72" font-weight="900" fill="#f59e0b" opacity="0.9">61</text>
  <text x="980" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#71717a">/100 Startup Score</text>

  <!-- Score arc progress -->
  <circle cx="980" cy="300" r="160" fill="none" stroke="url(#accent)" stroke-width="3" stroke-dasharray="502 1005" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 980 300)" opacity="0.6"/>

  <!-- Risk bars -->
  <g transform="translate(820, 380)">
    <rect x="0" y="0" width="320" height="4" rx="2" fill="#27272a"/>
    <rect x="0" y="0" width="186" height="4" rx="2" fill="#3b82f6"/>
    <text x="0" y="-8" font-family="system-ui" font-size="11" fill="#52525b">Market</text>
    <text x="320" y="-8" text-anchor="end" font-family="monospace" font-size="11" fill="#3b82f6">58</text>

    <rect x="0" y="16" width="320" height="4" rx="2" fill="#27272a"/>
    <rect x="0" y="16" width="134" height="4" rx="2" fill="#8b5cf6"/>
    <text x="0" y="10" font-family="system-ui" font-size="11" fill="#52525b">Competition</text>
    <text x="320" y="10" text-anchor="end" font-family="monospace" font-size="11" fill="#8b5cf6">42</text>

    <rect x="0" y="32" width="320" height="4" rx="2" fill="#27272a"/>
    <rect x="0" y="32" width="240" height="4" rx="2" fill="#f59e0b"/>
    <text x="0" y="26" font-family="system-ui" font-size="11" fill="#52525b">Problem</text>
    <text x="320" y="26" text-anchor="end" font-family="monospace" font-size="11" fill="#f59e0b">75</text>
  </g>

  <!-- Logo icon -->
  <g transform="translate(168, 240)">
    <rect width="56" height="56" rx="14" fill="#ffffff" opacity="0.95"/>
    <polygon points="34,10 22,30 30,30 22,46 38,24 30,24" fill="#09090b"/>
  </g>

  <!-- Brand name -->
  <text x="240" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" letter-spacing="-2" fill="#ffffff">NOOZEX</text>

  <!-- Gradient accent line -->
  <rect x="168" y="306" width="220" height="3" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="168" y="345" font-family="system-ui, sans-serif" font-size="20" fill="#71717a" letter-spacing="0.5">AI-Powered Startup Decision Engine</text>

  <!-- Feature pills -->
  <g transform="translate(168, 376)">
    <rect width="130" height="28" rx="14" fill="#1c1c1e" stroke="#2d2d30" stroke-width="1"/>
    <circle cx="20" cy="14" r="5" fill="#22c55e"/>
    <text x="34" y="19" font-family="system-ui" font-size="12" fill="#a1a1aa">Startup Scoring</text>

    <rect x="140" width="100" height="28" rx="14" fill="#1c1c1e" stroke="#2d2d30" stroke-width="1"/>
    <circle cx="160" cy="14" r="5" fill="#f59e0b"/>
    <text x="174" y="19" font-family="system-ui" font-size="12" fill="#a1a1aa">Risk Map</text>

    <rect x="250" width="118" height="28" rx="14" fill="#1c1c1e" stroke="#2d2d30" stroke-width="1"/>
    <circle cx="270" cy="14" r="5" fill="#6366f1"/>
    <text x="284" y="19" font-family="system-ui" font-size="12" fill="#a1a1aa">EN / RU</text>
  </g>

  <!-- Tech stack pills bottom -->
  <g transform="translate(168, 430)">
    <rect width="88" height="26" rx="13" fill="#18181b" stroke="#2d2d30" stroke-width="1"/>
    <text x="44" y="17.5" text-anchor="middle" font-family="monospace" font-size="11" fill="#60a5fa">Next.js 15</text>

    <rect x="98" width="100" height="26" rx="13" fill="#18181b" stroke="#2d2d30" stroke-width="1"/>
    <text x="148" y="17.5" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8">TypeScript</text>

    <rect x="208" width="80" height="26" rx="13" fill="#18181b" stroke="#2d2d30" stroke-width="1"/>
    <text x="248" y="17.5" text-anchor="middle" font-family="monospace" font-size="11" fill="#34d399">Tailwind</text>

    <rect x="298" width="70" height="26" rx="13" fill="#18181b" stroke="#2d2d30" stroke-width="1"/>
    <text x="333" y="17.5" text-anchor="middle" font-family="monospace" font-size="11" fill="#fb923c">shadcn</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#accent)" opacity="0.6"/>
</svg>
